name: Updates from upstream

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch: # to trigger job manually

jobs:
  update-snap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get latest tag
        id: get_tag
        run: |
          # get latest tag
          RELEASE=$(curl -s https://api.github.com/repos/KartKrewDev/RingRacers/releases/latest | jq -r .tag_name)
          echo "tag=$RELEASE" >> $GITHUB_OUTPUT

      - name: Update snapcraft.yaml
        run: |
          tag="${{ steps.get_tag.outputs.tag }}"
          # update version key
          # source tag key 
          # and assets URL
          # this isn't really adjusted for if the manifest ever changes
          # but it probably won't so i'm keepin it like this for now
          sed -i "s/^version: .*/version: '$tag'/" snapcraft.yaml  
          sed -i "s/source-tag: .*/source-tag: $tag/" snapcraft.yaml
          sed -i "s/Ring-Racers-v.*-Assets.zip/Ring-Racers-$tag-Assets.zip/" snapcraft.yaml
          sed -i "s/download\/v[0-9.]*\//download\/$tag\//" snapcraft.yaml

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add snapcraft.yaml
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "Ehh, nothin's here. Peace out."
            exit 1
          fi
          
          git commit -m "Bump version to ${{ steps.get_tag.outputs.tag }}"
          git push

  build-after-publish:
    name: Build snap
    needs: [update-snap]
    uses: ./.github/workflows/build.yml
    secrets: inherit
