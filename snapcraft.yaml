name: ringracers
base: core24
version: '2.4'
platforms:
  amd64:
  arm64:
summary: Racing at the Next Level
description: |
  Hang up your sneakers, because Dr. Robotnik and his ex-enemies are going go-karting! Use the untapped potential of rings to super-charge your vehicle across more than 200 crazy courses. With over 20 unique items and some of the hottest moves on this side of the Floating Island, this is Racing at the Next Level!

  Ring Racers is packed to the brim with features, building off the success of its predecessor RingRacers, including:
  
  - A ludicrously long list of courses and playable characters
  - A complete Grand Prix mode with CPU opponents and multiple difficulty levels
  - New and revamped items
  - Unique game systems and mechanics
  - Local split-screen multiplayer up to 4 players, and online play up to 16
  - A comprehensive Time Attack mode with replay support
  - A wealth of secrets to find
  In the Snap version of Ring Racers, your game data is located in **`~/snap/ringracers/.common/.ringracers`**.
  In order to load user modifications, please store them in this directory, or override your Snap configuration.
  
  Kart Krew Dev is not affiliated with SEGA Corporation. Dr. Robotnik's Ring Racers is a work of fan art.
grade: stable
confinement: strict
icon: ringracers.png

apps:
  ringracers:
    command: usr/games/RingRacers/ringracers
    desktop: org.kartkrew.RingRacers.desktop
    common-id: org.kartkrew.RingRacers
    environment:
      HOME: $SNAP_USER_COMMON
      SRB2WADDIR: $SNAP/usr/games/RingRacers
      LD_LIBRARY_PATH: $SNAP/usr/lib:$SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:$LD_LIBRARY_PATH
    extensions: [gnome]
    plugs:
      - unity7
      - screen-inhibit-control
      - audio-playback
      - network
      - network-bind
      - home
      - removable-media
      - mount-observe
      - joystick
      - bluez

plugs:
  shared-memory:
    private: true

parts:
  ringracersassets:
    plugin: dump
    source: https://github.com/KartKrewDev/RingRacers/releases/download/v2.4/Dr.Robotnik.s-Ring-Racers-v2.4-Assets.zip
    organize:
      models: usr/games/RingRacers/models
      models.dat: usr/games/RingRacers/models.dat
      bios.pk3: usr/games/RingRacers/bios.pk3
      gamecontrollerdb.txt: usr/games/RingRacers/gamecontrollerdb.txt
      PASSWORDS.txt: usr/games/RingRacers/PASSWORDS.txt
      data: usr/games/RingRacers/data
    prime:
      - usr/games/RingRacers   

  libyuv:
    plugin: cmake
    source: https://salsa.debian.org/debian/libyuv.git
    source-commit: 8f0761d7b98aa402548983b2f823e5c1e81d687b
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE="Release"
  
  ringracers-app:
    plugin: cmake
    source: https://github.com/KartKrewDev/RingRacers.git
    source-tag: v2.4
    after: [libyuv, ringracersassets]
    build-packages:
      - libsdl2-mixer-dev
      - libsdl2-dev
      - libupnp-dev
      - libgme-dev
      - libopenmpt-dev
      - libjpeg-dev
      - libc6-dev
      - libpng-dev
      - libcurl4-openssl-dev
      - nasm
      - zlib1g-dev
      - build-essential
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DSRB2_CONFIG_DEV_BUILD=OFF
      - -DSRB2_SDL2_EXE_NAME=ringracers
    override-build: |
      # find assets
      asset_base=$(find $SNAPCRAFT_STAGE -name "bios.pk3" -printf '%h' -quit)

      if [ -n "$asset_base" ]; then
          # define target (relative to src root here)
          # snapcraft uses build for its cmake plugins
          target_dir="../src/assets/installer"
          mkdir -p "$target_dir"
          
          # cp assets
          cp "$asset_base/PASSWORDS.txt" "$target_dir/"
          cp "$asset_base"/bios.pk3 "$target_dir/"
          cp "$asset_base"/*.dat "$target_dir/"
          cp "$asset_base"/gamecontrollerdb.txt "$target_dir/"
          
          # cp data and models as well
          cp -r "$asset_base/data" "$target_dir/"
          cp -r "$asset_base/models" "$target_dir/"
          
          echo "assets copied to $target_dir"
      else
          echo "error: could not find needed assets"
          exit 1
      fi

      craftctl default

      # find binary
      # cuz i don't wanna look for it right now
      kart=$(find . -name "ringracers" -type f -executable -print -quit)

      # check if the binary exists and then move it
      # to satisfy the packer when its doing its job
      if [ -n "$kart" ]; then
          echo "found binary at $kart, moving to install destination"
          mkdir -p "$CRAFT_PART_INSTALL/usr/games/RingRacers"
          cp "$kart" "$CRAFT_PART_INSTALL/usr/games/RingRacers/ringracers"
      else
          echo "error: ringracers binary not found after build"
          exit 1
      fi
  dependencies:
    after: [ringracersassets]
    plugin: nil
    stage-packages:
      - libsdl2-2.0-0
      - libsdl2-mixer-2.0-0
      - libsamplerate0
      - libdecor-0-0
      - libfluidsynth3
      - libinstpatch-1.0-2
      - libjack0
      - libmodplug1
      - libopusfile0
    prime:
      - usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/*

  desktop-file:
    after: [dependencies]
    plugin: dump
    source: ./desktop-file
    prime:
      - org.kartkrew.RingRacers.desktop
